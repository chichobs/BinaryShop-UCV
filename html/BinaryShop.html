<html>
<head>
    <title>BinaryShop</title>
    <link rel="shortcut icon" href="/home/chichobs/Escritorio/BinaryShop-UCV/img/icono B.jpeg" type="image/x-icon" />
</head>
<body>
    <div class="lista-tienda">
        <header>
            <div class="Logo">
                <img src="/home/chichobs/Escritorio/BinaryShop-UCV/img/icono B.jpeg" alt="Logo de la tienda">
                <h1 class="nombre-tienda"> BinaryShop</h1>
            </div>
            <div class="barra-busqueda">
                    <input type="text" placeholder="Buscar producto"/>
            </div>
            <button class="open-menu"><i class="bi bi-list"></i></button>
        </header>
        <div class="close-menu">
            <button><i class="bi bi-x"></i></button>
        </div>
        <div class="categorias">
            <h2 class="titulo-categorias">Categorias</h2>
            <ul class="menu">
                <li>
                    <button id="Todos" class="boton-menu boton-categoria active" type="button"><i class="bi bi-caret-right-fill"></i> Todos los productos</button>
                </li>
                <li>
                    <button id="Botanica" class="boton-menu boton-categoria" type="button"><i class="bi bi-tree"></i> Botanica</button>
                </li>
                <li>
                    <button id="Entretenimiento" class="boton-menu boton-categoria" type="button"><i class="bi bi-dice-6"></i> Entretenimiento</button>
                </li>
                <li>
                    <button id="Estudio" class="boton-menu boton-categoria" type="button"><i class="bi bi-highlighter"></i> Estudio</button>
                </li>
                <li>
                    <button id="Fitness" class="boton-menu boton-categoria" type="button"><i class="bi bi-bicycle"></i> Fitness</button>
                </li>
                <li>
                    <button id="Higiene" class="boton-menu boton-categoria" type="button"><i class="bi bi-prescription2"></i> Higiene</button>
                </li>
                <li>
                    <button id="Hogar" class="boton-menu boton-categoria" type="button"><i class="bi bi-house"></i> Hogar</button>
                </li>
                <li>
                    <button id="Oficina" class="boton-menu boton-categoria" type="button"><i class="bi bi-buildings"></i> Oficina</button>
                </li>
                <li>
                    <button id="Salud" class="boton-menu boton-categoria" type="button"><i class="bi bi-emoji-smile"></i> Salud</button>
                </li>
                <li>
                    <button id="Seguridad" class="boton-menu boton-categoria" type="button"><i class="bi bi-shield-lock"></i> Seguridad</button>
                </li>
                <li>
                    <button id="Tecnologia" class="boton-menu boton-categoria" type="button"><i class="bi bi-display"></i> Tecnologia</button>
                </li>
                <li>
                    <button id="Viajes" class="boton-menu boton-categoria" type="button"><i class="bi bi-suitcase"></i> Viajes</button>
                </li>
                <li>
                    <a class="boton-menu boton-carrito" href="Carrito.html">
                        <i class="bi bi-cart-fill"></i> Carrito <span id="numerito" class="numerito">0</span>
                    </a>
                </li>
            </ul>
        </div>
        <footer>
            <p class="texto-footer">© 2025 BinaryShop</p>
        </footer>

    </div>
</body>
</html>
